<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; 
                   img-src ${cspSource} https: data:; 
                   media-src ${cspSource} https: blob:;
                   script-src 'nonce-${nonce}'; 
                   style-src ${cspSource} 'unsafe-inline';
                   font-src ${cspSource};">
    <link rel="stylesheet" href="${styleUri}">
    <title>SonicFlow</title>
</head>

<body>
    <div id="sonicflow-app" class="theme-aurora">

        <!-- Header / Drag Bar -->
        <div class="sf-header" id="dragBar">
            <div class="sf-logo">
                <span class="sf-logo-icon">◉</span>
                <span class="sf-logo-text">SonicFlow</span>
            </div>
            <div class="sf-header-actions">
                <button class="sf-btn-icon" id="btnMinimize" title="Minimize">
                    <svg width="14" height="14" viewBox="0 0 14 14">
                        <line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.5" />
                    </svg>
                </button>
                <button class="sf-btn-icon" id="btnTheme" title="Change Theme">
                    <svg width="14" height="14" viewBox="0 0 14 14">
                        <circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" stroke-width="1.5" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Now Playing / Album Art -->
        <div class="sf-now-playing">
            <div class="sf-artwork-container">
                <div class="sf-artwork" id="artwork">
                    <div class="sf-artwork-placeholder">
                        <svg width="48" height="48" viewBox="0 0 48 48">
                            <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="1.5"
                                opacity="0.3" />
                            <circle cx="24" cy="24" r="8" fill="none" stroke="currentColor" stroke-width="1.5"
                                opacity="0.5" />
                            <circle cx="24" cy="24" r="3" fill="currentColor" opacity="0.5" />
                        </svg>
                    </div>
                    <img id="artworkImg" class="sf-artwork-img hidden" alt="Album Art" />
                </div>
                <div class="sf-artwork-glow" id="artworkGlow"></div>
            </div>

            <div class="sf-track-info">
                <div class="sf-track-title" id="trackTitle">No Track Selected</div>
                <div class="sf-track-artist" id="trackArtist">Browse or search for music</div>
                <div class="sf-track-source" id="trackSource"></div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="sf-progress-section">
            <span class="sf-time" id="currentTime">0:00</span>
            <div class="sf-progress-bar" id="progressBar">
                <div class="sf-progress-track">
                    <div class="sf-progress-fill" id="progressFill"></div>
                    <div class="sf-progress-handle" id="progressHandle"></div>
                </div>
            </div>
            <span class="sf-time" id="totalTime">0:00</span>
        </div>

        <!-- Main Controls -->
        <div class="sf-controls">
            <button class="sf-btn-control sf-btn-secondary" id="btnShuffle" title="Shuffle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="16,3 21,3 21,8" />
                    <line x1="4" y1="20" x2="21" y2="3" />
                    <polyline points="21,16 21,21 16,21" />
                    <line x1="15" y1="15" x2="21" y2="21" />
                    <line x1="4" y1="4" x2="9" y2="9" />
                </svg>
            </button>

            <button class="sf-btn-control" id="btnPrev" title="Previous">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="19,20 9,12 19,4" />
                    <line x1="5" y1="4" x2="5" y2="20" stroke="currentColor" stroke-width="2" />
                </svg>
            </button>

            <button class="sf-btn-control sf-btn-play" id="btnPlayPause" title="Play">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                    <polygon points="5,3 19,12 5,21" />
                </svg>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="pauseIcon" class="hidden">
                    <rect x="5" y="3" width="4" height="18" />
                    <rect x="15" y="3" width="4" height="18" />
                </svg>
            </button>

            <button class="sf-btn-control" id="btnNext" title="Next">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5,4 15,12 5,20" />
                    <line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2" />
                </svg>
            </button>

            <button class="sf-btn-control sf-btn-secondary" id="btnRepeat" title="Repeat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="17,1 21,5 17,9" />
                    <path d="M3,11V9a4,4,0,0,1,4-4H21" />
                    <polyline points="7,23 3,19 7,15" />
                    <path d="M21,13v2a4,4,0,0,1-4,4H3" />
                </svg>
                <span class="sf-repeat-badge hidden" id="repeatBadge">1</span>
            </button>
        </div>

        <!-- Volume Control -->
        <div class="sf-volume-section">
            <button class="sf-btn-icon" id="btnVolume" title="Volume">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    id="volumeIcon">
                    <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" />
                    <path d="M19.07,4.93a10,10,0,0,1,0,14.14" id="volumeHigh" />
                    <path d="M15.54,8.46a5,5,0,0,1,0,7.07" id="volumeMed" />
                </svg>
            </button>
            <div class="sf-volume-slider-container">
                <input type="range" class="sf-volume-slider" id="volumeSlider" min="0" max="100" value="70">
            </div>
        </div>

        <!-- Action Bar -->
        <div class="sf-action-bar">
            <button class="sf-btn-action" id="btnBrowse" title="Browse Local Files">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22,19a2,2,0,0,1-2,2H4a2,2,0,0,1-2-2V5A2,2,0,0,1,4,3H9l2,3h9a2,2,0,0,1,2,2Z" />
                </svg>
                <span>Browse</span>
            </button>

            <button class="sf-btn-action" id="btnYouTube" title="Search YouTube">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <span>YouTube</span>
            </button>

            <button class="sf-btn-action" id="btnPlaylist" title="Playlists">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                <span>Playlists</span>
            </button>

            <button class="sf-btn-action" id="btnVibe" title="Vibe Mode">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9,18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                </svg>
                <span>Vibe</span>
            </button>
        </div>

        <!-- Queue Section (Collapsible) -->
        <div class="sf-queue-section" id="queueSection">
            <div class="sf-queue-header" id="queueToggle">
                <span>Queue</span>
                <span class="sf-queue-count" id="queueCount">0</span>
                <svg class="sf-chevron" width="12" height="12" viewBox="0 0 12 12">
                    <polyline points="2,4 6,8 10,4" fill="none" stroke="currentColor" stroke-width="1.5" />
                </svg>
            </div>
            <div class="sf-queue-list hidden" id="queueList">
                <!-- Queue items will be dynamically inserted -->
            </div>
        </div>

        <!-- Hidden Audio Element -->
        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <script nonce="${nonce}" src="${scriptUri}"></script>
</body>

</html>
